name: Keep backend warm

# Pings the deployed backend's /health endpoint on a schedule so the free-tier
# host (Koyeb / Hugging Face / etc.) never scales to zero, eliminating the
# cold-start delay for portfolio visitors. No third-party uptime service needed.
#
# Setup: in the repo, go to Settings -> Secrets and variables -> Actions ->
# Variables tab, and add a variable named BACKEND_HEALTH_URL set to your
# deployed health URL, e.g. https://your-service.koyeb.app/health
#
# Note: GitHub's scheduler can delay cron runs by several minutes under load,
# and disables schedules after 60 days of repo inactivity. If you ever see a
# cold start, add a free cron-job.org / UptimeRobot monitor as a backup.

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Don't pile up runs if one is slow.
concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.BACKEND_HEALTH_URL }}"
          if [ -z "$URL" ]; then
            echo "BACKEND_HEALTH_URL repo variable is not set — skipping."
            exit 0
          fi
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 30 "$URL" || true)
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "backend is warm."
              exit 0
            fi
            sleep 10
          done
          # Exit success even if the ping failed, so a transient blip does not
          # spam the repo with failed-workflow notifications.
          echo "warm ping did not return 200 (host may be waking up)."
          exit 0
