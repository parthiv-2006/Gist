services:
  - type: web
    name: gist-backend
    runtime: python
    rootDir: gist-backend
    # Install from requirements.txt (cross-platform). Do NOT use requirements.lock:
    # it is generated by `pip freeze` on Windows and pins pywin32, which fails to
    # install on Render's Linux build environment.
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false           # Set manually in Render dashboard — NEVER commit this value
      - key: MONGODB_URI
        sync: false           # Set manually in Render dashboard — NEVER commit this value
      - key: ALLOWED_ORIGINS
        # ⚠️ SECURITY: Replace "*" with your extension's origin before publishing.
        # Example: chrome-extension://fiofemaagodcciffhpmpbdjlhbbbaegm
        # A wildcard allows any origin to call the API and consume your Gemini quota.
        value: "*"
    autoDeploy: false
